<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SENTRY | Threat Intelligence</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="hero" style="background-color: #050505;">
        <div class="hero-content">
            <h1 class="hero-title">SENTRY</h1>
            <p class="hero-subtitle">Real-Time Social Threat Intelligence</p>
        </div>
    </header>

    <section class="scroll-slide" id="ingestion" style="background-color: #0B1120;">
        <div class="stage-container">
            <div class="stage-header">
                <h2>Data Ingestion</h2>
            </div>
            
            <div class="grid">
                <section class="frame">
                    <div class="frame-header">
                        <h3>Write Your Review</h3>
                        <span class="count-badge" id="organicCount">0</span>
                    </div>
                    <textarea id="manualPost" placeholder="Enter standard human review..."></textarea>
                    <button onclick="addOrganicData()" class="btn btn-outline">Inject Node</button>
                    <div class="scroll-stack" id="organicFeed"></div>
                </section>

                <section class="frame">
                    <div class="frame-header">
                        <h3>Generate Swarm</h3>
                        <span class="count-badge" id="swarmCount">0</span>
                    </div>
                    <div class="input-row">
                        <input id="target" type="text" placeholder="#Target">
                        <input id="count" type="number" value="10">
                    </div>
                    <button onclick="addSwarmData()" id="swarmBtn" class="btn btn-outline">Generate Swarm</button>
                    <div class="scroll-stack" id="swarmFeed"></div>
                </section>
            </div>
        </div>
    </section>

    <section class="scroll-slide" id="pipeline" style="background-color: #111827;">
        <div class="stage-container">
            <div class="stage-header">
                <h2>Merge & Randomize Reviews</h2>
            </div>
            
            <div class="action-bar">
                <button onclick="shuffleAndDisplay()" class="btn-massive">Shuffle & Analyze Corpus</button>
            </div>

            <section class="frame full-width">
                <div class="frame-header" style="margin-bottom: 0;">
                </div>
                <div id="mixedFeed" class="scroll-stack large">
                    <div class="empty-state">Empty</div>
                </div>
            </section>
        </div>
    </section>

   <section class="scroll-slide" id="model" style="background-color: #161e2b;">
        <div class="stage-container">
            <div class="stage-header">
                <h2>Transformer Model Pipeline</h2>
            </div>

            <div class="action-bar">
                <button class="btn-massive">Check For Swarms</button>
            </div>

            <section class="frame full-width">
                <div class="scroll-stack large">
                    <div class="empty-state">Empty</div>
                </div>
            </section>
        </div>
    </section>

    <script src="script.js"></script>
</body>
</html>
